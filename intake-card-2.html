    .card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(

      align-items: center;

      font-size: 14px;
      font-weight: 600;

        transform 120ms ease,
        box-shadow 120ms ease,
        background 120ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

      width: 16px;
      height: 16px;

      stroke-width: 2.2;
